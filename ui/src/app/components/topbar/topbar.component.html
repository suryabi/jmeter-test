<header class="topbar">
  <div class="topbar-inner">
    <a routerLink="/" class="brand">
      <span class="brand-logo-wrap">
        <img
          class="brand-logo"
          src="/briefingiq-logo.png"
          alt="BriefingIQ"
          width="199"
          height="173"
        />
      </span>
      <span class="brand-sub">JMeter Console</span>
    </a>

    <nav class="nav">
      <a routerLink="/" routerLinkActive="nav-active" [routerLinkActiveOptions]="{ exact: true }">
        <i class="pi pi-bolt"></i>
        <span>Workbench</span>
      </a>
      <a routerLink="/plans" routerLinkActive="nav-active">
        <i class="pi pi-folder-open"></i>
        <span>Plans</span>
      </a>
    </nav>

    <div class="status">
      <span class="status-pill" [class.online]="apiOnline" [class.offline]="!apiOnline">
        <span class="dot"></span>
        {{ apiOnline ? 'Runner online' : 'Runner offline' }}
      </span>
      <span class="version">v1.0.0</span>
    </div>
  </div>
</header>
