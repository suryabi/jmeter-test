<app-topbar />

<div class="mx-auto w-full max-w-7xl px-4 py-8 md:px-6">
  <section class="page-hero">
    <div class="page-hero-content">
      <span class="page-hero-eyebrow">
        <i class="pi pi-bolt"></i>
        New run
      </span>
      <h1 class="page-hero-title">Build your <span class="gradient-text">next run</span></h1>
      <p class="page-hero-sub">
        Pick a plan, tune the parameters, and launch. You can copy every setting from a previous
        run to start faster.
      </p>
    </div>
  </section>

  @if (error) {
    <div class="my-4">
      <p-message severity="error" [text]="error" />
    </div>
  }

  <app-start-run-form class="mt-6 block" [priorRuns]="priorRuns" (start)="onStartRun($event)" />
</div>
